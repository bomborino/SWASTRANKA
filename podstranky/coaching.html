<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>THE FINALS: COACHING SIGN UP</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: { background: "#131313", surface: "#1c1b1b", primary: "#d91931" },
                    fontFamily: { display: ["Space Grotesk"], body: ["Inter"] }
                }
            }
        }
    </script>
    <style>
        .scanline { background: linear-gradient(to bottom, rgba(255, 255, 255, 0) 50%, rgba(255, 255, 255, 0.01) 50%); background-size: 100% 4px; pointer-events: none; }
        body, html { height: 100%; margin: 0; padding: 0; background: #000; overflow-x: hidden; }
    </style>
</head>
<body class="text-white font-body">
    <div class="fixed inset-0 scanline z-50"></div>
    <div class="min-h-screen bg-background relative flex flex-col items-center justify-center py-12 px-4">
        <div class="max-w-2xl w-full space-y-8 bg-surface p-10 border-2 border-white/10 relative z-10 shadow-[0_0_50px_rgba(217,25,49,0.1)]">
            <div>
                <h2 class="mt-6 text-center text-4xl font-extrabold text-white font-display uppercase italic tracking-wider">
                    Sign Up For <span class="text-primary">Coaching</span>
                </h2>
                <p class="mt-2 text-center text-sm text-gray-400">Take your gameplay to the next level.</p>
            </div>
            
            <form action="https://api.web3forms.com/submit" method="POST" class="mt-8 space-y-6">
                <!-- ZDE JE TVŮJ NOVÝ KEY -->
                <input type="hidden" name="access_key" value="be626e4f-dde4-42cd-9927-f1ff3b70b723">
                <input type="hidden" name="from_name" value="Coaching Application Form">
                <input type="hidden" name="subject" value="New Coaching Sign-up">
                
                <!-- DŮLEŽITÉ: Redirect funguje zdarma pouze na stejnou doménu -->
                <input type="hidden" name="redirect" value="https://niggatron.static2.website/subpages/coaching.html">

                <div class="grid grid-cols-1 gap-y-6 gap-x-4 sm:grid-cols-2">
                    <div class="sm:col-span-2">
                        <label class="block text-sm font-medium text-gray-300">Full Name</label>
                        <input type="text" name="name" required class="mt-1 block w-full border-gray-600 bg-[#2a2a2a] text-white p-3 focus:ring-primary focus:border-primary rounded-none">
                    </div>
                    
                    <div class="sm:col-span-1">
                        <label class="block text-sm font-medium text-gray-300">Email Address</label>
                        <input type="email" name="email" required class="mt-1 block w-full border-gray-600 bg-[#2a2a2a] text-white p-3 focus:ring-primary focus:border-primary rounded-none">
                    </div>

                    <div class="sm:col-span-1">
                        <label class="block text-sm font-medium text-gray-300">In-game Username</label>
                        <input type="text" name="username" required class="mt-1 block w-full border-gray-600 bg-[#2a2a2a] text-white p-3 focus:ring-primary focus:border-primary rounded-none">
                    </div>

                    <div class="sm:col-span-1">
                        <label class="block text-sm font-medium text-gray-300">Current Rank</label>
                        <select name="current_rank" class="mt-1 block w-full border-gray-600 bg-[#2a2a2a] text-white p-3 focus:ring-primary focus:border-primary rounded-none">
                            <option>Bronze</option>
                            <option>Silver</option>
                            <option>Gold</option>
                            <option>Platinum</option>
                            <option>Diamond</option>
                        </select>
                    </div>

                    <div class="sm:col-span-1">
                        <label class="block text-sm font-medium text-gray-300">Goal Rank</label>
                        <select name="goal_rank" class="mt-1 block w-full border-gray-600 bg-[#2a2a2a] text-white p-3 focus:ring-primary focus:border-primary rounded-none">
                            <option>Silver</option>
                            <option>Gold</option>
                            <option>Platinum</option>
                            <option>Diamond</option>
                        </select>
                    </div>

                    <div class="sm:col-span-2">
                        <label class="block text-sm font-medium text-gray-300">Coaching Frequency</label>
                        <select name="frequency" class="mt-1 block w-full border-gray-600 bg-[#2a2a2a] text-white p-3 focus:ring-primary focus:border-primary rounded-none">
                            <option>2hr/2 weeks</option>
                            <option>2hr/week</option>
                            <option>4hr/week</option>
                        </select>
                    </div>

                    <div class="sm:col-span-2">
                        <label class="block text-sm font-medium text-gray-300">Additional Notes</label>
                        <textarea name="notes" rows="4" required class="mt-1 block w-full border-gray-600 bg-[#2a2a2a] text-white p-3 focus:ring-primary focus:border-primary rounded-none"></textarea>
                    </div>
                </div>

                <div>
                    <button type="submit" class="w-full flex justify-center py-4 px-4 border-2 border-transparent text-sm font-bold uppercase tracking-widest text-white bg-primary hover:bg-[#b01024] transition-colors">
                        Submit Application
                    </button>
                </div>
            </form>
            
            <div class="mt-4 text-center">
                <a href="../index.html" class="text-sm text-gray-400 hover:text-white underline">Return to Home</a>
            </div>
        </div>
    </div>
<!-- Static App Form Collection Script -->
<script src="https://static.app/js/static-forms.js" type="text/javascript"></script>

<script src="https://static.app/js/static.js" type="text/javascript"></script>
</body>
</html>
